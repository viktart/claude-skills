name: DemoApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
settings:
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: 1
  VERSIONING_SYSTEM: apple-generic
  GENERATE_INFOPLIST_FILE: YES
targets:
  DemoApp:
    type: application
    platform: iOS
    sources: [DemoApp]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.DemoApp
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
  DemoAppTests:
    type: bundle.unit-test
    platform: iOS
    sources: [DemoAppTests]
    dependencies:
      - target: DemoApp
  DemoAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [DemoAppUITests]
    dependencies:
      - target: DemoApp
schemes:
  DemoApp:
    build:
      targets:
        DemoApp: all
        DemoAppTests: [test]
        DemoAppUITests: [test]
    test:
      targets:
        - DemoAppTests
        - DemoAppUITests
