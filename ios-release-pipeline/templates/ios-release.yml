name: iOS Release (quick)

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

# Two concurrent runs would race on the version bump and one push would be rejected.
concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # xcodegen projects gitignore the .xcodeproj and need the tool for the version bump.
      - name: Generate Xcode project (xcodegen projects only)
        if: ${{ hashFiles('project.yml') != '' }}
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Release (quick, no tests)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane release_quick bump_type:${{ inputs.bump_type }}
